name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  lint-and-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Save build folder
        uses: actions/upload-artifact@v6
        with:
          name: build
          if-no-files-found: error
          path: dist

  cypress-e2e:
    runs-on: ubuntu-latest
    needs: lint-and-build

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download the build folder
        uses: actions/download-artifact@v7
        with:
          name: build
          path: dist

      - name: Cypress run
        uses: cypress-io/github-action@v7
        with:
          start: npm run dev
          browser: chrome
